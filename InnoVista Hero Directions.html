<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InnoVista — Hero Direction Explorations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#0a0f0a" />
    <rect x="30" y="30" width="40" height="40" rx="12" fill="#52b788" />
    <path d="M40 44l5.5 12.5a3.2 3.2 0 0 0 9 0L60 44" stroke="#0a0f0a" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="directions.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { DirEditorial, DirTechnical, DirQuiet, DirQuietDark, DirSplit, DIR_W, DIR_H } = window;

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="heroes" title="InnoVista — Hero Directions" subtitle="Editorial & tech-driven, minimal, with a sparing green accent. React to these before we rebuild the full site.">
          <DCArtboard id="a" label="A · Editorial Index — masthead, hairlines, mono labels (light)" width={DIR_W} height={DIR_H}><DirEditorial /></DCArtboard>
          <DCArtboard id="b" label="B · Technical Spec — grid, crosshairs, dev-tool register (dark)" width={DIR_W} height={DIR_H}><DirTechnical /></DCArtboard>
          <DCArtboard id="c" label="C · Quiet Statement — max whitespace, one accent word (light)" width={DIR_W} height={DIR_H}><DirQuiet /></DCArtboard>
          <DCArtboard id="c2" label="C2 · Quiet Statement — DARK (your pick, on brand black)" width={DIR_W} height={DIR_H}><DirQuietDark /></DCArtboard>
          <DCArtboard id="d" label="D · Split Index — asymmetric, numbered method list (dark)" width={DIR_W} height={DIR_H}><DirSplit /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
