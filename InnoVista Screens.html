<title>InnoVista Strategies — Product UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Sora:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Hanken Grotesk', sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #141714; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-thumb { background: rgba(140,160,150,.22); border-radius: 9px; border: 3px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(140,160,150,.35); background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes ivblink { 0%, 60%, 100% { opacity: .25; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-2px); } }
  @keyframes ivpulse { 0% { box-shadow: 0 0 0 0 rgba(82,183,136,.5); } 70% { box-shadow: 0 0 0 16px rgba(82,183,136,0); } 100% { box-shadow: 0 0 0 0 rgba(82,183,136,0); } }
  input::placeholder { color: #6c8073; }
</style>
</head>

<div id="root"></div>
